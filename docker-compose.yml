services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-init.sh:/scripts/ollama-init.sh
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST}
    entrypoint:
      - /bin/sh
      - /scripts/ollama-init.sh
    command:
      - ${SMALL_LLM_MODEL}
      - ${LARGE_LLM_MODEL}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: ${IS_PERSISTENT}

  connector:
    build:
      context: .
      dockerfile: Dockerfile.connector
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      CONNECTOR_HOST: ${CONNECTOR_HOST}
      CONNECTOR_PORT: ${CONNECTOR_PORT}
      USE_RABBITMQ: ${USE_RABBITMQ}
      # Wazuh services are on the host, not in this compose
      WAZUH_API_URL: https://host.docker.internal:55000
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASS: ${WAZUH_API_PASS}
      WAZUH_API_INDEXER_URL: https://host.docker.internal:9200
      WAZUH_API_INDEXER_USER: ${WAZUH_API_INDEXER_USER}
      WAZUH_API_INDEXER_PASS: ${WAZUH_API_INDEXER_PASS}
      WAZUH_API_INDEXER_ALERT: ${WAZUH_API_INDEXER_ALERT}

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8001:8001"
    depends_on:
      - rabbitmq
      - ollama
      - chroma
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      SMALL_LLM_MODEL: ${SMALL_LLM_MODEL}
      LARGE_LLM_MODEL: ${LARGE_LLM_MODEL}
      CHROMA_HOST: ${CHROMA_HOST}
      CHROMA_PORT: ${CHROMA_PORT}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION}
      AGENT_HOST: ${AGENT_HOST}
      AGENT_PORT: ${AGENT_PORT}
      WAZUH_API_URL: ${WAZUH_API_URL}
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASS: ${WAZUH_API_PASS}

volumes:
  rabbitmq_data:
  ollama_data:
  chroma_data:
