services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-init.sh:/scripts/ollama-init.sh
    environment:
      OLLAMA_HOST: 0.0.0.0
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/sh
      - /scripts/ollama-init.sh
    command:
    
      - ${SMALL_LLM_MODEL}
      - ${LARGE_LLM_MODEL}


  connector:
    build:
      context: .
      dockerfile: Dockerfile.connector
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: admin
      RABBITMQ_PASS: guest
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      CONNECTOR_HOST: 0.0.0.0
      CONNECTOR_PORT: 8000
      USE_RABBITMQ: "true"
      WAZUH_API_URL: https://host.docker.internal:55000
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASS: ${WAZUH_API_PASS}
      WAZUH_API_INDEXER_URL: https://host.docker.internal:9200
      WAZUH_API_INDEXER_USER: ${WAZUH_API_INDEXER_USER}
      WAZUH_API_INDEXER_PASS: ${WAZUH_API_INDEXER_PASS}
      WAZUH_API_INDEXER_ALERT: ${WAZUH_API_INDEXER_ALERT}

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8001:8001"
    depends_on:
      - rabbitmq
      - ollama
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: admin
      RABBITMQ_PASS: guest
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      SMALL_LLM_MODEL: ${SMALL_LLM_MODEL}
      LARGE_LLM_MODEL: ${LARGE_LLM_MODEL}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-/app/chroma_data}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-aisoc_playbooks}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: 8001
      WAZUH_API_URL: ${WAZUH_API_URL}
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASS: ${WAZUH_API_PASS}

      INDEXER_URL: https://host.docker.internal:9200
      INDEXER_USER: ${INDEXER_USER}
      INDEXER_PASS: ${INDEXER_PASS}
      INDEXER_PREFIX: ${INDEXER_PREFIX}
      INDEXER_VERIFY_SSL: false
volumes:
  rabbitmq_data:
  ollama_data:
